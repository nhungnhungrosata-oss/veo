<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Brand AI</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=Be+Vietnam+Pro:wght@700;800;900&subset=vietnamese&display=swap" rel="stylesheet">

    <!-- PWA: Android / Chrome -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0EA5E9" />

    <!-- PWA: iOS Safari -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Brand AI" />

    <!-- Apple Touch Icons — đúng tên file thực tế -->
    <link rel="apple-touch-icon" sizes="57x57"   href="/icons/icon-57x57.png" />
    <link rel="apple-touch-icon" sizes="60x60"   href="/icons/icon-60x60.png" />
    <link rel="apple-touch-icon" sizes="72x72"   href="/icons/icon-72x72.png" />
    <link rel="apple-touch-icon" sizes="76x76"   href="/icons/icon-76x76.png" />
    <link rel="apple-touch-icon" sizes="114x114" href="/icons/icon-114x114.png" />
    <link rel="apple-touch-icon" sizes="120x120" href="/icons/icon-120x120.png" />
    <link rel="apple-touch-icon" sizes="144x144" href="/icons/icon-144x144.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152x152.png" />
    <link rel="apple-touch-icon" sizes="167x167" href="/icons/icon-167x167.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-180x180.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/icon-16x16.png" />

    <!-- Xóa SW cũ và cache cũ ngay khi load -->
    <script>
      (function() {
        var SW_VERSION = 'v3';
        var storageKey = '__sw_version__';
        var currentVersion = localStorage.getItem(storageKey);
        if (currentVersion !== SW_VERSION) {
          localStorage.setItem(storageKey, SW_VERSION);
          if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function(regs) {
              regs.forEach(function(reg) { reg.unregister(); });
            });
          }
          if ('caches' in window) {
            caches.keys().then(function(keys) {
              keys.forEach(function(key) { caches.delete(key); });
            });
          }
          if (navigator.serviceWorker && navigator.serviceWorker.controller) {
            window.location.reload(true);
          }
        }
      })();
    </script>
    <!-- PWA Scripts -->
    <script src="/pwa-register.js" defer></script>
    <script src="/pwa-install.js" defer></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
